name: Deploy (manual)

# INTENTIONALLY manual-trigger only (workflow_dispatch), NOT on push to main.
#
# Why: `anchr deploy` signs and sends a real Solana transaction
# (lib/sns.js) using ANCHR_WALLET_SECRET_KEY. Auto-firing that on every
# push to main — before the SNS write path has been verified on devnet —
# risks sending unintended on-chain transactions from CI. Automating this
# on push is a Week 3 roadmap item (see docs/ROADMAP.md), to be enabled
# only after the devnet verification in README.md's "Before running
# against a real domain" section has been done.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   ANCHR_STORACHA_KEY
#   ANCHR_STORACHA_PROOF
#   ANCHR_WALLET_SECRET_KEY
#   ANCHR_SOLANA_RPC_URL (optional)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm install
      - run: node bin/anchr.js deploy
        env:
          ANCHR_STORACHA_KEY: ${{ secrets.ANCHR_STORACHA_KEY }}
          ANCHR_STORACHA_PROOF: ${{ secrets.ANCHR_STORACHA_PROOF }}
          ANCHR_WALLET_SECRET_KEY: ${{ secrets.ANCHR_WALLET_SECRET_KEY }}
          ANCHR_SOLANA_RPC_URL: ${{ secrets.ANCHR_SOLANA_RPC_URL }}
